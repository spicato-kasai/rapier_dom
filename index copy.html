<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DOMをRapierで動かす</title>
		<link rel="stylesheet" href="/src/style.css" />
	</head>
	<body>
		<main class="layout">
			<div id="box"></div>
			<div id="box2"></div>
			<svg class="stone1" width="272" height="247" fill="none" viewBox="0 0 272 247">
				<defs>
					<clipPath id="stone1Clip">
						<path d="M25 65 1 104l41 73 33 37 91 32 61-32 44-58-44-91L121 1 75 44z" />
					</clipPath>
				</defs>
				<!-- 物理判定用（非表示） -->
				<path class="physics-path" fill="none" stroke="none" d="M25 65 1 104l41 73 33 37 91 32 61-32 44-58-44-91L121 1 75 44z" />
				<image href="/src/calender_image.jpg" x="0" y="0" width="272" height="247" preserveAspectRatio="xMidYMid slice" clip-path="url(#stone1Clip)" />
			</svg>

			<svg class="stone2" width="380" height="213" fill="none" viewBox="0 0 380 213">
				<defs>
					<clipPath id="stone2Clip">
						<path d="m38 38-6 9L1 174l4 27 20 11 226-11 84-70 44-104-34-26-180 26-69-9H66z" />
					</clipPath>
				</defs>
				<path class="physics-path" fill="none" stroke="none" d="m38 38-6 9L1 174l4 27 20 11 226-11 84-70 44-104-34-26-180 26-69-9H66z" />
				<image href="/src/calender_image.jpg" x="0" y="0" width="380" height="213" preserveAspectRatio="xMidYMid slice" clip-path="url(#stone2Clip)" />
			</svg>

			<div class="floor"></div>
		</main>
		<script type="module" src="/src/mainDomMove.js"></script>
	</body>
</html>
